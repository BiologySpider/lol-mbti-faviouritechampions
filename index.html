        // 3. 系统状态变量
        let currentQuestionIndex = 0;
        let userScore = [5.0, 5.0, 5.0, 5.0]; // 初始玩家基准分

        // 4. UI 逻辑控制
        function startQuiz() {
            document.getElementById('screen-start').classList.add('hidden');
            document.getElementById('screen-quiz').classList.remove('hidden');
            renderQuestion();
        }

        function renderQuestion() {
            const q = QUESTIONS[currentQuestionIndex];
            document.getElementById('question-counter').innerText = `题目 ${currentQuestionIndex + 1} / ${QUESTIONS.length}`;
            document.getElementById('question-text').innerText = q.q;
            
            // 更新进度条
            const progress = ((currentQuestionIndex) / QUESTIONS.length) * 100;
            document.getElementById('progress-bar').style.width = `${progress}%`;

            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = ''; // 清空上一题选项
            
            q.options.forEach((opt) => {
                const btn = document.createElement('button');
                btn.className = "w-full text-left bg-slate-700 border border-slate-600 rounded-lg p-4 text-slate-200 option-btn";
                btn.innerText = opt.text;
                btn.onclick = () => handleAnswer(opt.weight);
                optionsContainer.appendChild(btn);
            });
        }

        function handleAnswer(weightArray) {
            // 累加向量分数
            for(let i=0; i<4; i++) {
                userScore[i] += weightArray[i];
            }
            
            currentQuestionIndex++;
            if (currentQuestionIndex < QUESTIONS.length) {
                renderQuestion();
            } else {
                calculateResult();
            }
        }

        // 5. 终极算法引擎：余弦相似度 + 平滑归一化
        function calculateResult() {
            document.getElementById('screen-quiz').classList.add('hidden');
            document.getElementById('screen-result').classList.remove('hidden');

            // 1. 分数平滑压缩 (Min-Max Normalization)
            // 将 50 题带来的巨大偏差，优雅地压缩回 0.1 - 9.9 的雷达图区间
            let finalVector = [0, 0, 0, 0];
            for(let i=0; i<4; i++) {
                // 压缩因子 0.12：你累加的每 1 分，在最终雷达图上只体现为 0.12 的偏移
                let scaled = 5.0 + (userScore[i] - 5.0) * 0.12;
                finalVector[i] = Math.max(0.1, Math.min(9.9, scaled));
            }

            // 2. 余弦相似度匹配 (Cosine Similarity)
            // 不看绝对数值大小，只看你多维向量的“灵魂方向”是否一致
            let bestMatch = CHAMPIONS[0];
            let maxSimilarity = -Infinity;

            CHAMPIONS.forEach(champ => {
                let dotProduct = 0;
                let normA = 0;
                let normB = 0;
                for(let i=0; i<4; i++) {
                    dotProduct += finalVector[i] * champ.vector[i];
                    normA += Math.pow(finalVector[i], 2);
                    normB += Math.pow(champ.vector[i], 2);
                }
                
                // 余弦公式：(A·B) / (|A|*|B|)
                let similarity = dotProduct / (Math.sqrt(normA) * Math.sqrt(normB));

                if (similarity > maxSimilarity) {
                    maxSimilarity = similarity;
                    bestMatch = champ;
                }
            });

            // 3. 渲染结果
            document.getElementById('result-champ').innerText = bestMatch.name;
            document.getElementById('result-stats').innerHTML = 
                `团队意识: ${finalVector[0].toFixed(1)} <br>
                 激进狂暴: ${finalVector[1].toFixed(1)} <br>
                 微操手法: ${finalVector[2].toFixed(1)} <br>
                 刀尖风险: ${finalVector[3].toFixed(1)}`;
        }
