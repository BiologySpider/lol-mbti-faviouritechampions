        // 3. 系统状态变量
        let currentQuestionIndex = 0;
        let userScore = [5.0, 5.0, 5.0, 5.0]; // 初始玩家基准分

        // 4. UI 逻辑控制
        function startQuiz() {
            document.getElementById('screen-start').classList.add('hidden');
            document.getElementById('screen-quiz').classList.remove('hidden');
            renderQuestion();
        }

        function renderQuestion() {
            const q = QUESTIONS[currentQuestionIndex];
            document.getElementById('question-counter').innerText = `题目 ${currentQuestionIndex + 1} / ${QUESTIONS.length}`;
            document.getElementById('question-text').innerText = q.q;
            
            // 更新进度条
            const progress = ((currentQuestionIndex) / QUESTIONS.length) * 100;
            document.getElementById('progress-bar').style.width = `${progress}%`;

            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = ''; // 清空上一题选项
            
            q.options.forEach((opt) => {
                const btn = document.createElement('button');
                btn.className = "w-full text-left bg-slate-700 border border-slate-600 rounded-lg p-4 text-slate-200 option-btn";
                btn.innerText = opt.text;
                btn.onclick = () => handleAnswer(opt.weight);
                optionsContainer.appendChild(btn);
            });
        }

        function handleAnswer(weightArray) {
            // 累加向量分数
            for(let i=0; i<4; i++) {
                userScore[i] += weightArray[i];
            }
            
            currentQuestionIndex++;
            if (currentQuestionIndex < QUESTIONS.length) {
                renderQuestion();
            } else {
                calculateResult();
            }
        }

        // 5. 核心余弦距离/欧氏距离匹配算法
        function calculateResult() {
            document.getElementById('screen-quiz').classList.add('hidden');
            document.getElementById('screen-result').classList.remove('hidden');

            let bestMatch = CHAMPIONS[0];
            let minDistance = Infinity;

            CHAMPIONS.forEach(champ => {
                // 计算欧氏距离：Math.sqrt( (u0-c0)^2 + (u1-c1)^2 + ... )
                let sumOfSquares = 0;
                for(let i=0; i<4; i++) {
                    sumOfSquares += Math.pow(userScore[i] - champ.vector[i], 2);
                }
                const distance = Math.sqrt(sumOfSquares);
                
                if (distance < minDistance) {
                    minDistance = distance;
                    bestMatch = champ;
                }
            });

            document.getElementById('result-champ').innerText = bestMatch.name;
            document.getElementById('result-stats').innerHTML = 
                `团队意识: ${userScore[0].toFixed(1)} <br>
                 激进狂暴: ${userScore[1].toFixed(1)} <br>
                 微操手法: ${userScore[2].toFixed(1)} <br>
                 刀尖风险: ${userScore[3].toFixed(1)}`;
        }
