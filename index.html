        // 4. UI 逻辑控制
        function startQuiz() {

        function renderQuestion() {
            const q = QUESTIONS[currentQuestionIndex];
            document.getElementById('question-counter').innerText = `题目 ${currentQuestionIndex + 1} / ${QUESTIONS.length}`;

            document.getElementById('progress-bar').style.width = `${progress}%`;

            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = ''; // 清空上一题选项
            
            q.options.forEach((opt) => {
                const btn = document.createElement('button');
                btn.className = "w-full text-left bg-slate-700 border border-slate-600 rounded-lg p-4 text-slate-200 option-btn";
                btn.innerText = opt.text;
                
                // 【核心升级】判断当前选项传递的是标签数组还是分值数组
                const payload = opt.tags ? opt.tags : opt.weight;
                btn.onclick = () => handleAnswer(payload);
                
                optionsContainer.appendChild(btn);
            });
        }

        function handleAnswer(payload) {
            // 如果传来的是标签（第一域的题目）
            if (typeof payload[0] === 'string') {
                userTags = userTags.concat(payload);
            } 
            // 如果传来的是操作分值（后续行为题）
            else {
                for(let i=0; i<4; i++) {
                    userScore[i] += payload[i];
                }
            }
            
            currentQuestionIndex++;
            if (currentQuestionIndex < QUESTIONS.length) {
                renderQuestion();
            } else {
                calculateResult();
            }
        }

        // 5. 混合算法引擎 (Hybrid Recommendation Engine)
        function calculateResult() {
            document.getElementById('screen-quiz').classList.add('hidden');
            document.getElementById('screen-result').classList.remove('hidden');

            // 1. 分数平滑压缩 (将 50 题带来的巨大偏差压缩回雷达图)
            let finalVector = [0, 0, 0, 0];
            for(let i=0; i<4; i++) {
                let scaled = 5.0 + (userScore[i] - 5.0) * 0.12;
                finalVector[i] = Math.max(0.1, Math.min(9.9, scaled));
            }

            let bestMatch = CHAMPIONS[0];
            let maxHybridScore = -Infinity;

            CHAMPIONS.forEach(champ => {
                // A: 计算余弦相似度 (Cosine Similarity)
                let dotProduct = 0;
                let normA = 0;
                let normB = 0;
                for(let i=0; i<4; i++) {
                    dotProduct += finalVector[i] * champ.vector[i];
                    normA += Math.pow(finalVector[i], 2);
                    normB += Math.pow(champ.vector[i], 2);
                }
                let rawCosine = dotProduct / (Math.sqrt(normA) * Math.sqrt(normB));
                // 将 Cosine 从 [-1, 1] 映射到 [0, 1] 以便组合权重
                let cosineNorm = (rawCosine + 1) / 2;

                // B: 计算灵魂标签覆盖率 (Tag Hit Rate)
                let intersection = 0;
                champ.tags.forEach(tag => {
                    if (userTags.includes(tag)) intersection++;
                });
                // 如果该英雄有 4 个标签，你中了 3 个，契合度就是 0.75
                let tagHitRate = intersection / champ.tags.length;

                // C: 最终混合打分 = (操作分 * 70%) + (灵魂分 * 30%)
                let hybridScore = (cosineNorm * 0.7) + (tagHitRate * 0.3);

                if (hybridScore > maxHybridScore) {
                    maxHybridScore = hybridScore;
                    bestMatch = champ;
                }
            });

            // 提取匹配结果和交集标签渲染
            let matchedTags = bestMatch.tags.filter(tag => userTags.includes(tag));
            let tagDisplay = matchedTags.length > 0 ? matchedTags.join(" / ") : "你的灵魂极其独特，无明确分类。";

            document.getElementById('result-champ').innerText = bestMatch.name;
            document.getElementById('result-stats').innerHTML = 
                `团队防线: ${finalVector[0].toFixed(1)} <br>
                 激进杀心: ${finalVector[1].toFixed(1)} <br>
                 极限微操: ${finalVector[2].toFixed(1)} <br>
                 刀尖舔血: ${finalVector[3].toFixed(1)}`;
            document.getElementById('result-tags').innerText = tagDisplay;
        }
